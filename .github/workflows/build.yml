name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        include:
          - arch: armeabi-v7a
            ndk-version: r19c
            api-level: 19
          - arch: arm64-v8a
            ndk-version: r23c
            api-level: 21
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: true
          local-cache: true

      - name: Prepare project structure
        run: |
          mkdir -p jni
          # Копируем только файлы из корня, чтобы не зациклиться
          find . -maxdepth 1 -name "*.cpp" -exec cp {} jni/ \;
          find . -maxdepth 1 -name "*.h" -exec cp {} jni/ \;
          find . -maxdepth 1 -name "*.hpp" -exec cp {} jni/ \;

      - name: Configure Application.mk
        run: |
          cat > jni/Application.mk << EOF
          APP_ABI := ${{ matrix.arch }}
          APP_PLATFORM := android-${{ matrix.api-level }}
          APP_STL := c++_static
          APP_OPTIM := release
          APP_CPPFLAGS := -frtti -fexceptions
          # СТРОГО ЗАПРЕЩЕНО для r23+: NDK_TOOLCHAIN_VERSION
          EOF

      - name: Configure Android.mk
        run: |
          cat > jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := samp
          
          # Корректный поиск файлов внутри папки jni
          MY_SOURCES := $(wildcard $(LOCAL_PATH)/*.cpp)
          LOCAL_SRC_FILES := $(MY_SOURCES:$(LOCAL_PATH)/%=%)
          
          LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv1_CM -lGLESv2 -lz
          LOCAL_CFLAGS := -DANDROID -D_ANDROID -fPIC -O2
          LOCAL_CPPFLAGS := -frtti -fexceptions -std=c++11
          
          include $(BUILD_SHARED_LIBRARY)
          EOF

      - name: Build with ndk-build
        run: |
          # Принудительно задаем пути, чтобы ndk-build не терялся
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=$(pwd) \
            NDK_APPLICATION_MK=$(pwd)/jni/Application.mk \
            APP_BUILD_SCRIPT=$(pwd)/jni/Android.mk \
            -j$(nproc)

      - name: Verify and Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-${{ matrix.arch }}
          path: |
            libs/${{ matrix.arch }}/libsamp.so
            obj/local/${{ matrix.arch }}/libsamp.so

  package:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-libs

      - name: Prepare Final Package
        run: |
          mkdir -p final-output
          find all-libs/ -name "*.so" -exec cp {} final-output/ \;
          ls -R final-output/

      - name: Upload Complete Build
        uses: actions/upload-artifact@v4
        with:
          name: samp-mobile-complete
          path: final-output/