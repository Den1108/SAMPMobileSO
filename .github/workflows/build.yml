name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        include:
          - arch: armeabi-v7a
            ndk-version: r21e
            api-level: 19
          - arch: arm64-v8a
            ndk-version: r21e
            api-level: 21
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: true
          local-cache: true

      - name: Prepare project structure
        run: |
          # Создаем временную директорию вне дерева проекта, чтобы избежать рекурсии 'cp'
          mkdir -p ../jni_tmp
          cp -r . ../jni_tmp/
          
          # Переносим всё содержимое обратно в папку 'jni', которая нужна ndk-build
          mkdir -p jni
          mv ../jni_tmp/* ./jni/ || true
          
          # Удаляем лишние артефакты
          rm -rf jni/jni jni/libs jni/obj
          
          echo "Проверка структуры (должна быть папка j/vendor/RakNet/...):"
          ls -d jni/vendor/RakNet/SAMP || echo "ВНИМАНИЕ: Путь к RakNet не найден!"

      - name: Configure Build Files
        run: |
          # Создаем Application.mk
          cat > jni/Application.mk << EOF
          APP_ABI := ${{ matrix.arch }}
          APP_PLATFORM := android-${{ matrix.api-level }}
          APP_STL := c++_static
          APP_OPTIM := release
          APP_CPPFLAGS := -frtti -fexceptions
          EOF

          # Создаем Android.mk с правильными путями инклудов
          cat > jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := samp
          
          # Рекурсивный поиск всех .cpp файлов
          define walk
              $(wildcard $(1)/*.cpp) $(foreach e, $(wildcard $(1)/*), $(call walk, $(e)))
          endef
          
          ALL_FILES := $(call walk, $(LOCAL_PATH))
          LOCAL_SRC_FILES := $(ALL_FILES:$(LOCAL_PATH)/%=%)
          
          # Добавляем пути для поиска заголовков
          # Мы добавляем сам LOCAL_PATH, чтобы работали инклуды вида "vendor/..."
          LOCAL_C_INCLUDES := $(LOCAL_PATH) \
                              $(LOCAL_PATH)/vendor \
                              $(LOCAL_PATH)/vendor/RakNet
          
          LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv1_CM -lGLESv2 -lz
          LOCAL_CFLAGS := -DANDROID -D_ANDROID -fPIC -O2
          LOCAL_CPPFLAGS := -frtti -fexceptions -std=c++11
          
          include $(BUILD_SHARED_LIBRARY)
          EOF

      - name: Configure server IP and Port
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          [ -z "$SERVER_IP" ] && SERVER_IP="188.127.241.8"
          [ -z "$SERVER_PORT" ] && SERVER_PORT="1179"
          
          # Ищем main.cpp во всей папке jni
          MAIN_FILE=$(find jni -name "main.cpp" | head -n 1)
          if [ -f "$MAIN_FILE" ]; then
            sed -i "s/encryptedAddress\.decrypt()/\"$SERVER_IP\"/g" "$MAIN_FILE"
            sed -i "s/port,/$SERVER_PORT,/g" "$MAIN_FILE"
            echo "Настройки сервера обновлены в $MAIN_FILE"
          fi

      - name: Build with ndk-build
        run: |
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          # Запускаем из корня, ndk-build автоматически найдет папку jni
          ndk-build NDK_PROJECT_PATH=$(pwd) -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-${{ matrix.arch }}
          path: libs/${{ matrix.arch }}/libsamp.so
          if-no-files-found: error