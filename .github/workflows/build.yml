name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        include:
          - arch: armeabi-v7a
            ndk-version: r19c
          - arch: arm64-v8a
            ndk-version: r23c
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Обновлено до 17 для лучшей совместимости с новыми экшенами

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: true
          local-cache: true

      - name: Prepare project structure
        run: |
          mkdir -p jni
          echo "Копирование исходников в jni..."
          find . -maxdepth 1 -name "*.cpp" -exec cp {} jni/ \;
          find . -maxdepth 1 -name "*.h" -exec cp {} jni/ \;
          # Если есть подпапки с кодом, их тоже стоит учесть или использовать прямые пути в Android.mk

      - name: Configure Application.mk
        run: |
          cat > jni/Application.mk << EOF
          APP_ABI := ${{ matrix.arch }}
          APP_PLATFORM := android-21
          APP_STL := c++_static
          APP_OPTIM := release
          APP_CPPFLAGS := -frtti -fexceptions
          EOF
          # Удален NDK_TOOLCHAIN_VERSION, так как он мешает сборке на r23c

      - name: Configure Android.mk
        run: |
          if [ ! -f jni/Android.mk ]; then
            cat > jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := samp
          # Автоматический поиск всех cpp в папке jni
          FILE_LIST := $(wildcard $(LOCAL_PATH)/*.cpp)
          LOCAL_SRC_FILES := $(FILE_LIST:$(LOCAL_PATH)/%=%)
          LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv1_CM -lGLESv2 -lz
          LOCAL_CFLAGS := -DANDROID -D_ANDROID -fPIC -O2
          LOCAL_CPPFLAGS := -frtti -fexceptions -std=c++11
          include $(BUILD_SHARED_LIBRARY)
          EOF
          fi

      - name: Build with ndk-build
        run: |
          # Используем переменную окружения ANDROID_NDK_ROOT, которую обычно ставит setup-ndk
          export NDK_PROJECT_PATH=$(pwd)
          ndk-build \
            NDK_PROJECT_PATH=$NDK_PROJECT_PATH \
            APP_BUILD_SCRIPT=$NDK_PROJECT_PATH/jni/Android.mk \
            NDK_APPLICATION_MK=$NDK_PROJECT_PATH/jni/Application.mk

      - name: Verify and Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-${{ matrix.arch }}
          path: |
            libs/${{ matrix.arch }}/libsamp.so
            obj/local/${{ matrix.arch }}/libsamp.so

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Finalize logs
        run: |
          mkdir -p output
          find artifacts/ -name "*.so" -exec cp {} output/ \;
          ls -R output/

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: samp-complete-build
          path: output/