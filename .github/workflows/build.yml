name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        include:
          - arch: armeabi-v7a
            ndk-version: r19c
            api-level: 19
          - arch: arm64-v8a
            # Заменяем r23c на r21e (самая стабильная для ndk-build) или r26b
            ndk-version: r21e 
            api-level: 21
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: true

      - name: Prepare project structure
        run: |
          mkdir -p jni
          # Копируем исходники, игнорируя саму папку jni
          find . -maxdepth 1 -name "*.cpp" -exec cp {} jni/ \;
          find . -maxdepth 1 -name "*.h" -exec cp {} jni/ \;
          find . -maxdepth 1 -name "*.hpp" -exec cp {} jni/ \;
          
          # Проверка наличия файлов
          ls -la jni/

      - name: Configure Application.mk
        run: |
          cat > jni/Application.mk << EOF
          APP_ABI := ${{ matrix.arch }}
          APP_PLATFORM := android-${{ matrix.api-level }}
          APP_STL := c++_static
          APP_OPTIM := release
          APP_CPPFLAGS := -frtti -fexceptions
          EOF

      - name: Configure Android.mk
        run: |
          cat > jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := samp
          
          # Находим все cpp файлы в папке jni
          FILE_LIST := $(wildcard $(LOCAL_PATH)/*.cpp)
          LOCAL_SRC_FILES := $(FILE_LIST:$(LOCAL_PATH)/%=%)
          
          LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv1_CM -lGLESv2 -lz
          LOCAL_CFLAGS := -DANDROID -D_ANDROID -fPIC -O2
          LOCAL_CPPFLAGS := -frtti -fexceptions -std=c++11
          
          include $(BUILD_SHARED_LIBRARY)
          EOF

      - name: Build with ndk-build
        run: |
          # Устанавливаем переменные окружения явно
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          export PATH=$ANDROID_NDK_HOME:$PATH
          
          echo "Используем NDK из: $ANDROID_NDK_HOME"
          
          # Запуск сборки
          ndk-build \
            NDK_PROJECT_PATH=$(pwd) \
            NDK_APPLICATION_MK=$(pwd)/jni/Application.mk \
            APP_BUILD_SCRIPT=$(pwd)/jni/Android.mk \
            -j$(nproc)

      - name: Verify Build
        run: |
          if [ -d "libs/${{ matrix.arch }}" ]; then
            ls -la libs/${{ matrix.arch }}/
          else
            echo "Ошибка: Библиотеки не найдены в libs/"
            find . -name "*.so"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-${{ matrix.arch }}
          path: libs/${{ matrix.arch }}/libsamp.so

  package:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-libs

      - name: Prepare Final Package
        run: |
          mkdir -p final-package/armeabi-v7a
          mkdir -p final-package/arm64-v8a
          
          [ -f all-libs/libsamp-armeabi-v7a/libsamp.so ] && cp all-libs/libsamp-armeabi-v7a/libsamp.so final-package/armeabi-v7a/
          [ -f all-libs/libsamp-arm64-v8a/libsamp.so ] && cp all-libs/libsamp-arm64-v8a/libsamp.so final-package/arm64-v8a/
          
          echo "Итоговый пакет:"
          ls -R final-package/

      - name: Upload Complete Build
        uses: actions/upload-artifact@v4
        with:
          name: samp-mobile-complete
          path: final-package/