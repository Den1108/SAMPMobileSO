name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        # Используем одну версию NDK для обеих архитектур
        include:
          - arch: armeabi-v7a
            ndk-version: r17c
          - arch: arm64-v8a
            ndk-version: r17c
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: true
          local-cache: true

      - name: Prepare project structure
        run: |
          # Создаем папку jni если её нет
          mkdir -p jni
          
          # Ищем все исходные файлы в проекте
          echo "Поиск .cpp файлов:"
          find . -maxdepth 1 -name "*.cpp" -exec cp -v {} jni/ \;
          
          echo "Поиск .h файлов:"
          find . -maxdepth 1 -name "*.h" -exec cp -v {} jni/ \;
          
          echo "Поиск .mk файлов:"
          find . -maxdepth 1 -name "*.mk" -exec cp -v {} jni/ \;
          
          echo "Содержимое папки jni после копирования:"
          ls -la jni/
          
          # Проверяем наличие main.cpp
          if [ ! -f jni/main.cpp ]; then
            echo "ОШИБКА: main.cpp не найден!"
            echo "Поиск main.cpp:"
            find . -name "main.cpp"
            exit 1
          fi

      - name: Configure Application.mk for ${{ matrix.arch }}
        run: |
          cat > jni/Application.mk << EOF
APP_ABI := ${{ matrix.arch }}
APP_PLATFORM := android-14
APP_STL := gnustl_static
APP_OPTIM := release
APP_CPPFLAGS := -frtti -fexceptions
NDK_TOOLCHAIN_VERSION := 4.9
EOF
          
          echo "Application.mk создан:"
          cat jni/Application.mk

      - name: Configure Android.mk
        run: |
          cat > jni/Android.mk << 'EOF'
LOCAL_PATH := $(call my-dir)
include $(CLEAR_VARS)

LOCAL_MODULE := samp
LOCAL_SRC_FILES := $(wildcard $(LOCAL_PATH)/*.cpp)
LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv1_CM -lGLESv2 -lz
LOCAL_CFLAGS := -DANDROID -D_ANDROID -fPIC -O2
LOCAL_CPPFLAGS := -frtti -fexceptions

include $(BUILD_SHARED_LIBRARY)
EOF
          
          echo "Android.mk создан:"
          cat jni/Android.mk

      - name: Configure server IP
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          
          if [ -z "$SERVER_IP" ]; then
            SERVER_IP="188.127.241.8"
            echo "SERVER_IP не задан, использую 188.127.241.8"
          fi
          
          if [ -z "$SERVER_PORT" ]; then
            SERVER_PORT="1179"
            echo "SERVER_PORT не задан, использую 1179"
          fi
          
          # Создаем резервную копию
          cp jni/main.cpp jni/main.cpp.backup
          
          # Заменяем адрес сервера
          sed -i "s/encryptedAddress\.decrypt()/\"$SERVER_IP\"/g" jni/main.cpp
          sed -i "s/port,/$SERVER_PORT,/g" jni/main.cpp
          
          echo "IP и порт установлены: $SERVER_IP:$SERVER_PORT"
          echo "Изменения в main.cpp:"
          grep -A 3 -B 3 "CNetGame" jni/main.cpp || echo "CNetGame не найден"

      - name: Build with ndk-build for ${{ matrix.arch }}
        run: |
          # Показываем информацию о NDK
          echo "NDK версия: ${{ matrix.ndk-version }}"
          echo "NDK путь: $ANDROID_NDK_ROOT"
          echo "Текущая директория: $(pwd)"
          
          # Запускаем ndk-build
          ndk-build NDK_PROJECT_PATH=$(pwd) V=1
          
          echo "Результат сборки:"
          find . -name "*.so" -type f || echo "Библиотеки не найдены"

      - name: Find and copy library
        run: |
          echo "Поиск libsamp.so:"
          find . -name "*.so" -type f
          
          # Создаем папку для результата
          mkdir -p output
          
          # Ищем библиотеку в разных местах
          LIB_FOUND=0
          
          if [ -f libs/${{ matrix.arch }}/libsamp.so ]; then
            echo "✅ Найдена в libs/${{ matrix.arch }}/libsamp.so"
            cp libs/${{ matrix.arch }}/libsamp.so output/libsamp.so
            LIB_FOUND=1
          elif [ -f obj/local/${{ matrix.arch }}/libsamp.so ]; then
            echo "✅ Найдена в obj/local/${{ matrix.arch }}/libsamp.so"
            cp obj/local/${{ matrix.arch }}/libsamp.so output/libsamp.so
            LIB_FOUND=1
          else
            # Поиск любого .so файла
            SO_FILE=$(find . -name "*.so" -type f | head -1)
            if [ -n "$SO_FILE" ]; then
              echo "✅ Найден .so файл: $SO_FILE"
              cp "$SO_FILE" output/libsamp.so
              LIB_FOUND=1
            fi
          fi
          
          if [ $LIB_FOUND -eq 1 ]; then
            echo "✅ Библиотека сохранена в output/libsamp.so"
            file output/libsamp.so
          else
            echo "❌ Библиотека не найдена!"
            exit 1
          fi

      - name: Upload libsamp.so for ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-so-${{ matrix.arch }}
          path: output/libsamp.so
          if-no-files-found: error
          retention-days: 90

  package:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          
      - name: Create combined package
        run: |
          mkdir -p final-package
          
          echo "Скачанные артефакты:"
          find downloaded-artifacts -type f -name "*.so" -ls
          
          # Копируем библиотеки
          if [ -f "downloaded-artifacts/libsamp-so-armeabi-v7a/libsamp.so" ]; then
            cp "downloaded-artifacts/libsamp-so-armeabi-v7a/libsamp.so" "final-package/armeabi-v7a-libsamp.so"
            echo "✅ Добавлена armeabi-v7a"
          fi
          
          if [ -f "downloaded-artifacts/libsamp-so-arm64-v8a/libsamp.so" ]; then
            cp "downloaded-artifacts/libsamp-so-arm64-v8a/libsamp.so" "final-package/arm64-v8a-libsamp.so"
            echo "✅ Добавлена arm64-v8a"
          fi
          
          # Создаем README
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          
          [ -z "$SERVER_IP" ] && SERVER_IP="188.127.241.8"
          [ -z "$SERVER_PORT" ] && SERVER_PORT="1179"
          
          cat > final-package/README.txt << EOF
SAMP Mobile Libraries
=====================

Дата сборки: $(date)
IP сервера: $SERVER_IP
Порт: $SERVER_PORT

Файлы:
$(ls -la final-package/)

Установка:
1. Распакуйте APK через APK Editor
2. Замените libsamp.so в папках lib/armeabi-v7a/ и lib/arm64-v8a/
3. Соберите APK обратно и подпишите его
EOF
          
          echo "Финальный пакет:"
          ls -la final-package/
          
      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: samp-mobile-libraries-complete
          path: final-package/
          retention-days: 90