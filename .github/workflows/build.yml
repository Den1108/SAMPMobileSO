name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        include:
          - arch: armeabi-v7a
            ndk-version: r21e
            api-level: 19
          - arch: arm64-v8a
            ndk-version: r21e
            api-level: 21
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: true
          local-cache: true

      - name: Prepare project structure
        run: |
          # Создаем временную папку для сборки
          mkdir -p jni_build
          
          # Копируем ВЕСЬ проект во временную папку jni_build
          # Это сохранит папку vendor и все вложенные зависимости
          cp -r . jni_build/
          
          # Переименовываем для ndk-build (он ищет папку с именем jni)
          mv jni_build jni
          
          # Удаляем старые артефакты, если они случайно скопировались
          rm -rf jni/libs jni/obj jni/.github
          
          echo "Структура папки jni/vendor:"
          ls -R jni/vendor || echo "Папка vendor не найдена!"

      - name: Configure Build Files
        run: |
          # Перезаписываем Application.mk внутри новой структуры jni
          cat > jni/Application.mk << EOF
          APP_ABI := ${{ matrix.arch }}
          APP_PLATFORM := android-${{ matrix.api-level }}
          APP_STL := c++_static
          APP_OPTIM := release
          APP_CPPFLAGS := -frtti -fexceptions
          EOF

          # Создаем Android.mk, который будет искать файлы рекурсивно
          cat > jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := samp
          
          # Рекурсивный поиск всех .cpp файлов в jni и подпапках (включая vendor)
          define walk
              $(wildcard $(1)/*.cpp) $(foreach e, $(wildcard $(1)/*), $(call walk, $(e)))
          endef
          
          ALL_FILES := $(call walk, $(LOCAL_PATH))
          LOCAL_SRC_FILES := $(ALL_FILES:$(LOCAL_PATH)/%=%)
          
          # Добавляем корень jni в пути поиска include
          LOCAL_C_INCLUDES := $(LOCAL_PATH) $(LOCAL_PATH)/vendor
          
          LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv1_CM -lGLESv2 -lz
          LOCAL_CFLAGS := -DANDROID -D_ANDROID -fPIC -O2
          LOCAL_CPPFLAGS := -frtti -fexceptions -std=c++11
          
          include $(BUILD_SHARED_LIBRARY)
          EOF

      - name: Configure server IP and Port
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          [ -z "$SERVER_IP" ] && SERVER_IP="188.127.241.8"
          [ -z "$SERVER_PORT" ] && SERVER_PORT="1179"
          
          # Ищем main.cpp везде в папке jni
          MAIN_PATH=$(find jni -name "main.cpp")
          if [ -f "$MAIN_PATH" ]; then
            sed -i "s/encryptedAddress\.decrypt()/\"$SERVER_IP\"/g" "$MAIN_PATH"
            sed -i "s/port,/$SERVER_PORT,/g" "$MAIN_PATH"
            echo "Настройки сервера обновлены в $MAIN_PATH"
          fi

      - name: Build with ndk-build
        run: |
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          # Запускаем сборку из корня, ndk-build подхватит папку jni
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=$(pwd) \
            -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-${{ matrix.arch }}
          path: libs/${{ matrix.arch }}/libsamp.so