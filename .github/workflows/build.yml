name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        include:
          - arch: armeabi-v7a
            ndk-version: r19c
          - arch: arm64-v8a
            ndk-version: r23c
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: false
          local-cache: true

      - name: Configure Application.mk for ${{ matrix.arch }}
        run: |
          # Создаем Application.mk с нужными параметрами
          cat > jni/Application.mk << EOF
          APP_ABI := ${{ matrix.arch }}
          APP_PLATFORM := android-16
          APP_STL := c++_static
          APP_OPTIM := release
          APP_CPPFLAGS := -frtti -fexceptions
          NDK_TOOLCHAIN_VERSION := clang
          EOF
          
          echo "Application.mk настроен для ${{ matrix.arch }}:"
          cat jni/Application.mk

      - name: Configure server IP
        run: |
          # Получаем значения из секретов
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          
          # Значения по умолчанию, если секреты не заданы
          if [ -z "$SERVER_IP" ]; then
            SERVER_IP="188.127.241.8"
            echo "SERVER_IP не задан, использую 188.127.241.8"
          fi
          
          if [ -z "$SERVER_PORT" ]; then
            SERVER_PORT="1179"
            echo "SERVER_PORT не задан, использую 1179"
          fi
          
          # Создаем резервную копию
          cp jni/main.cpp jni/main.cpp.backup
          
          # Заменяем адрес сервера
          sed -i "s/encryptedAddress\.decrypt()/\"$SERVER_IP\"/g" jni/main.cpp
          sed -i "s/port,/$SERVER_PORT,/g" jni/main.cpp
          
          echo "IP и порт установлены: $SERVER_IP:$SERVER_PORT"
          echo "Изменения в main.cpp:"
          grep -A 3 -B 3 "CNetGame" jni/main.cpp || true

      - name: Build with ndk-build for ${{ matrix.arch }}
        run: |
          cd jni
          ${{ steps.setup-ndk.outputs.ndk-path }}/ndk-build
          cd ..
          
          echo "Сборка завершена для ${{ matrix.arch }}"

      - name: Verify library exists
        run: |
          if [ -f libs/${{ matrix.arch }}/libsamp.so ]; then
            echo "libsamp.so успешно создан для ${{ matrix.arch }}"
            file libs/${{ matrix.arch }}/libsamp.so
          else
            echo "Ошибка: libsamp.so не найден для ${{ matrix.arch }}"
            echo "Содержимое libs/:"
            ls -la libs/ || true
            echo "Содержимое libs/${{ matrix.arch }}/:"
            ls -la libs/${{ matrix.arch }}/ || true
            exit 1
          fi

      - name: Upload libsamp.so for ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-so-${{ matrix.arch }}
          path: libs/${{ matrix.arch }}/libsamp.so
          if-no-files-found: error
          retention-days: 90

  package:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          
      - name: Create combined package
        run: |
          mkdir -p final-package
          
          # Копируем библиотеки если они есть
          if [ -d "downloaded-artifacts/libsamp-so-armeabi-v7a" ]; then
            cp downloaded-artifacts/libsamp-so-armeabi-v7a/libsamp.so final-package/armeabi-v7a-libsamp.so
            echo "Добавлена библиотека для armeabi-v7a"
          fi
          
          if [ -d "downloaded-artifacts/libsamp-so-arm64-v8a" ]; then
            cp downloaded-artifacts/libsamp-so-arm64-v8a/libsamp.so final-package/arm64-v8a-libsamp.so
            echo "Добавлена библиотека для arm64-v8a"
          fi
          
          # Получаем IP и порт из секретов (безопасно)
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          
          if [ -z "$SERVER_IP" ]; then
            SERVER_IP="127.0.0.1"
          fi
          
          if [ -z "$SERVER_PORT" ]; then
            SERVER_PORT="7777"
          fi
          
          # Создаем README с информацией
          cat > final-package/README.txt << EOF
          SAMP Mobile Libraries
          =====================
          
          Дата сборки: $(date)
          
          Доступные архитектуры:
          - armeabi-v7a: для старых 32-битных устройств
          - arm64-v8a: для современных 64-битных устройств
          
          Инструкция по установке:
          1. Распакуйте APK игры через APK Editor
          2. Замените файл libsamp.so в папке lib/armeabi-v7a/ или lib/arm64-v8a/
          3. Соберите APK обратно и подпишите его
          
          Настройки сервера:
          - IP: $SERVER_IP
          - Порт: $SERVER_PORT
          
          Примечание: эти настройки уже вшиты в библиотеку при компиляции
          EOF
          
          echo "Создан финальный пакет:"
          ls -la final-package/
          
      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: samp-mobile-libraries-complete
          path: final-package/
          retention-days: 90
