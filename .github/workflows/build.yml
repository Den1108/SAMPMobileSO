name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        include:
          - arch: armeabi-v7a
            ndk-version: r21e
            api-level: 19
          - arch: arm64-v8a
            ndk-version: r21e
            api-level: 21
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: true
          local-cache: true

      - name: Prepare JNI Folder
        run: |
          # 1. Создаем чистую папку jni
          mkdir -p jni_new
          
          # 2. Копируем всё содержимое репозитория в jni_new
          # Используем rsync или cp -v для контроля
          cp -R ./* jni_new/ 2>/dev/null || true
          
          # 3. Убираем саму папку jni_new из копии (если попала) и другие лишние данные
          rm -rf jni_new/jni_new jni_new/libs jni_new/obj
          
          # 4. Переименовываем в jni (как хочет ndk-build)
          mv jni_new jni
          
          # Проверяем физическое наличие файла перед сборкой
          echo "Проверка пути к файлу:"
          find jni/vendor -name "samp_netencr.h" || echo "ФАЙЛ НЕ НАЙДЕН!"

      - name: Create Build Configs
        run: |
          # Application.mk
          cat > jni/Application.mk << EOF
          APP_ABI := ${{ matrix.arch }}
          APP_PLATFORM := android-${{ matrix.api-level }}
          APP_STL := c++_static
          APP_OPTIM := release
          APP_CPPFLAGS := -frtti -fexceptions
          EOF

          # Android.mk
          cat > jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := samp
          
          # Находим все .cpp файлы рекурсивно
          define walk
              $(wildcard $(1)/*.cpp) $(foreach e, $(wildcard $(1)/*), $(call walk, $(e)))
          endef
          
          ALL_FILES := $(call walk, $(LOCAL_PATH))
          LOCAL_SRC_FILES := $(ALL_FILES:$(LOCAL_PATH)/%=%)
          
          # Указываем пути поиска заголовков принудительно
          LOCAL_C_INCLUDES := $(LOCAL_PATH) \
                              $(LOCAL_PATH)/vendor \
                              $(LOCAL_PATH)/vendor/RakNet \
                              $(LOCAL_PATH)/vendor/RakNet/SAMP
          
          # Добавляем флаг инклуда прямо в CFLAGS для надежности
          LOCAL_CFLAGS := -DANDROID -D_ANDROID -fPIC -O2 -I$(LOCAL_PATH) -I$(LOCAL_PATH)/vendor
          LOCAL_CPPFLAGS := -frtti -fexceptions -std=c++11
          LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv1_CM -lGLESv2 -lz
          
          include $(BUILD_SHARED_LIBRARY)
          EOF

      - name: Patch Server Info
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          [ -z "$SERVER_IP" ] && SERVER_IP="188.127.241.8"
          [ -z "$SERVER_PORT" ] && SERVER_PORT="1179"
          
          # Ищем main.cpp и заменяем данные
          MAIN_FILE=$(find jni -name "main.cpp" | head -n 1)
          if [ -n "$MAIN_FILE" ]; then
            sed -i "s/encryptedAddress\.decrypt()/\"$SERVER_IP\"/g" "$MAIN_FILE"
            sed -i "s/port,/$SERVER_PORT,/g" "$MAIN_FILE"
            echo "Обновлен $MAIN_FILE"
          fi

      - name: Run Build
        run: |
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=$(pwd) -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-${{ matrix.arch }}
          path: libs/${{ matrix.arch }}/libsamp.so