name: Build SAMP Mobile Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch: [armeabi-v7a, arm64-v8a]
        include:
          - arch: armeabi-v7a
            ndk-version: r19c
          - arch: arm64-v8a
            ndk-version: r23c
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: false
          local-cache: true

      - name: Prepare project structure
        run: |
          # Создаем папку jni и переносим файлы
          mkdir -p jni
          
          # Ищем все исходные файлы в проекте
          echo "Поиск .cpp файлов:"
          find . -name "*.cpp" -not -path "./jni/*" -exec cp {} jni/ \;
          
          echo "Поиск .h файлов:"
          find . -name "*.h" -not -path "./jni/*" -exec cp {} jni/ \;
          
          echo "Поиск .mk файлов:"
          find . -name "*.mk" -not -path "./jni/*" -exec cp {} jni/ \;
          
          echo "Содержимое папки jni после копирования:"
          ls -la jni/
          
          # Проверяем наличие main.cpp
          if [ ! -f jni/main.cpp ]; then
            echo "ОШИБКА: main.cpp не найден!"
            echo "Поиск main.cpp:"
            find . -name "main.cpp"
            exit 1
          fi

      - name: Configure Application.mk for ${{ matrix.arch }}
        run: |
          cat > jni/Application.mk << EOF
          APP_ABI := ${{ matrix.arch }}
          APP_PLATFORM := android-16
          APP_STL := c++_static
          APP_OPTIM := release
          APP_CPPFLAGS := -frtti -fexceptions
          NDK_TOOLCHAIN_VERSION := clang
          EOF
          
          echo "Application.mk создан:"
          cat jni/Application.mk

      - name: Configure Android.mk
        run: |
          # Создаем Android.mk если его нет
          if [ ! -f jni/Android.mk ]; then
            cat > jni/Android.mk << 'EOF'
            LOCAL_PATH := $(call my-dir)
            include $(CLEAR_VARS)
            
            LOCAL_MODULE := samp
            LOCAL_SRC_FILES := $(wildcard $(LOCAL_PATH)/*.cpp)
            LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv1_CM -lGLESv2 -lz
            LOCAL_CFLAGS := -DANDROID -D_ANDROID -fPIC -O2
            LOCAL_CPPFLAGS := -frtti -fexceptions -std=c++11
            
            include $(BUILD_SHARED_LIBRARY)
            EOF
            echo "Android.mk создан"
          else
            echo "Android.mk уже существует"
          fi
          
          cat jni/Android.mk

      - name: Configure server IP
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          
          if [ -z "$SERVER_IP" ]; then
            SERVER_IP="188.127.241.8"
            echo "SERVER_IP не задан, использую 188.127.241.8"
          fi
          
          if [ -z "$SERVER_PORT" ]; then
            SERVER_PORT="1179"
            echo "SERVER_PORT не задан, использую 1179"
          fi
          
          # Создаем резервную копию
          cp jni/main.cpp jni/main.cpp.backup
          
          # Заменяем адрес сервера
          sed -i "s/encryptedAddress\.decrypt()/\"$SERVER_IP\"/g" jni/main.cpp
          sed -i "s/port,/$SERVER_PORT,/g" jni/main.cpp
          
          echo "IP и порт установлены: $SERVER_IP:$SERVER_PORT"
          echo "Изменения в main.cpp:"
          grep -A 3 -B 3 "CNetGame" jni/main.cpp || echo "CNetGame не найден"

      - name: Build with ndk-build for ${{ matrix.arch }}
        run: |
          # Важно: указываем NDK_PROJECT_PATH
          export NDK_PROJECT_PATH=$(pwd)
          
          echo "NDK_PROJECT_PATH: $NDK_PROJECT_PATH"
          echo "Содержимое текущей папки:"
          ls -la
          echo "Содержимое jni:"
          ls -la jni/
          
          # Запускаем ndk-build
          ${{ steps.setup-ndk.outputs.ndk-path }}/ndk-build NDK_PROJECT_PATH=$(pwd) APP_BUILD_SCRIPT=$(pwd)/jni/Android.mk NDK_APPLICATION_MK=$(pwd)/jni/Application.mk
          
          echo "Результат сборки:"
          ls -la libs/ || echo "Папка libs не создана"

      - name: Verify library exists
        run: |
          echo "Поиск libsamp.so:"
          find . -name "*.so" -type f
          
          if [ -f libs/${{ matrix.arch }}/libsamp.so ]; then
            echo "✅ libsamp.so успешно создан для ${{ matrix.arch }}"
            file libs/${{ matrix.arch }}/libsamp.so
          elif [ -f libs/${{ matrix.arch }}/libsamp.so ]; then
            echo "✅ libsamp.so успешно создан для ${{ matrix.arch }}"
            file libs/${{ matrix.arch }}/libsamp.so
          else
            echo "❌ Ошибка: libsamp.so не найден!"
            echo "Содержимое папки проекта:"
            find . -type f -name "*.so" | head -20
            exit 1
          fi

      - name: Upload libsamp.so for ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: libsamp-so-${{ matrix.arch }}
          path: |
            libs/${{ matrix.arch }}/libsamp.so
            obj/local/${{ matrix.arch }}/libsamp.so
          if-no-files-found: warn
          retention-days: 90

  package:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          
      - name: Create combined package
        run: |
          mkdir -p final-package
          
          echo "Скачанные артефакты:"
          ls -la downloaded-artifacts/
          
          # Копируем библиотеки
          if [ -f "downloaded-artifacts/libsamp-so-armeabi-v7a/libsamp.so" ]; then
            cp downloaded-artifacts/libsamp-so-armeabi-v7a/libsamp.so final-package/armeabi-v7a-libsamp.so
            echo "✅ Добавлена armeabi-v7a"
          fi
          
          if [ -f "downloaded-artifacts/libsamp-so-arm64-v8a/libsamp.so" ]; then
            cp downloaded-artifacts/libsamp-so-arm64-v8a/libsamp.so final-package/arm64-v8a-libsamp.so
            echo "✅ Добавлена arm64-v8a"
          fi
          
          # Создаем README
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SERVER_PORT="${{ secrets.SERVER_PORT }}"
          
          [ -z "$SERVER_IP" ] && SERVER_IP="188.127.241.8"
          [ -z "$SERVER_PORT" ] && SERVER_PORT="1179"
          
          cat > final-package/README.txt << EOF
          SAMP Mobile Libraries
          =====================
          
          Дата сборки: $(date)
          IP сервера: $SERVER_IP
          Порт: $SERVER_PORT
          
          Файлы:
          $(ls -la final-package/)
          
          Установка:
          1. Распакуйте APK
          2. Замените libsamp.so в соответствующих папках
          3. Соберите APK обратно
          EOF
          
          echo "Финальный пакет:"
          ls -la final-package/
          
      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: samp-mobile-libraries-complete
          path: final-package/
          retention-days: 90